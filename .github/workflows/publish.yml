name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing (no API token needed)

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Verify version consistency (tag = pyproject.toml = __init__.py)
        run: |
          set -e

          # Tag name, e.g. "v1.0.2"
          TAG="${GITHUB_REF_NAME}"
          # Strip leading "v" -> "1.0.2"
          TAG_VERSION="${TAG#v}"

          # Read version from pyproject.toml
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          # Read __version__ from package
          PACKAGE_VERSION=$(python -c "import re; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('discordforge/__init__.py').read()).group(1))")

          echo "Git tag:        $TAG (version: $TAG_VERSION)"
          echo "pyproject.toml: $PYPROJECT_VERSION"
          echo "__init__.py:    $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match discordforge/__init__.py ($PACKAGE_VERSION)"
            exit 1
          fi

          echo "✓ All versions match: $TAG_VERSION"

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
